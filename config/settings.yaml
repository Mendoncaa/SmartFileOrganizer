# ──────────────────────────────────────────────
# Smart File Organizer — Global Settings
# ──────────────────────────────────────────────

watch_folders:
  - path: "~/Downloads"
    recursive: false
    enabled: true

debounce_seconds: 2.0
conflict_strategy: "rename"  # rename | overwrite | skip

ai:
  enabled: true
  model: "phi3:mini"
  host: "http://localhost:11434"
  timeout_seconds: 30
  max_file_size_mb: 50

logging:
  level: "INFO"
  log_dir: "logs"
  max_file_size_mb: 10
  backup_count: 5
